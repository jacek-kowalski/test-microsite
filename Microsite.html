<script>
var loading = document.getElementById("loader_ring");
var myVideo = document.getElementById("video1");
setTimeout(function()

}, 2000);

myVideoPlay = function() {
    loading.style.display = "none";
};
myVideoWait = function() {
    loading.style.display = "block";
};

myVideo.addEventListener("loadstart", myVideoWait, false);

myVideo.addEventListener("progress", myVideoPlay, false);
myVideo.addEventListener("timeupdate", myVideoPlay, false);

</script>
