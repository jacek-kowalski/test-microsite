        /* Spinning animation while video loading  */
        .lds-roller {
            position: absolute;
            width: 64px;
            height: 64px;
            top: 0;
            bottom: 0;
            left: 0;   /* Note: left & right have to be set for margin: auto to work! */
            right: 0;
            margin: auto;
        }
        .lds-roller div {
            -webkit-animation: lds-roller 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            transform-origin: 32px 32px;
        }
        .lds-roller div:after {
            content: " ";
            display: block;
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            margin: -3px 0 0 -3px;
        }
        .lds-roller div:nth-child(1) {
            -webkit-animation-delay: -0.036s;
        }
        .lds-roller div:nth-child(1):after {
            top: 50px;
            left: 50px;
        }
        .lds-roller div:nth-child(2) {
            -webkit-animation-delay: -0.072s;
        }
        .lds-roller div:nth-child(2):after {
            top: 54px;

        .lds-roller div:nth-child(3) {
            -webkit-animation-delay: -0.108s;

        .lds-roller div:nth-child(3):after {
            top: 57px;
            left: 39px;

        .lds-roller div:nth-child(4) {
            -webkit-animation-delay: -0.144s;

        .lds-roller div:nth-child(4):after {

        .lds-roller div:nth-child(5) {
            -webkit-animation-delay: -0.18s;

        .lds-roller div:nth-child(5):after {

            left: 25px;

        .lds-roller div:nth-child(6) {
            -webkit-animation-delay: -0.216s;
        }
        .lds-roller div:nth-child(6):after {
            top: 54px;
            left: 19px;
        }
        .lds-roller div:nth-child(7) {
            -webkit-animation-delay: -0.252s;
        }
        .lds-roller div:nth-child(7):after {
            top: 50px;

        }
        .lds-roller div:nth-child(8) {
            -webkit-animation-delay: -0.288s;
        }
        .lds-roller div:nth-child(8):after {
            top: 45px;
            left: 10px;
        }

  /**
   * Helper function to create script tags
   * @param {string[]} scriptArray
   */
  function createScript(scriptArray) {
    var scriptNode     = document.createElement('script');
    scriptNode.type    = 'text/javascript';
    scriptNode.charset = 'utf-8';
    scriptArray.forEach(function (src) {
      var script = scriptNode.cloneNode(true);
      script.src = src;
      insertToDoc(script, 'body');
    });
  }

  /**

  function createObject(objectArray) {
    objectArray.forEach(function (obj) {
      var objNode = document.createElement('object');
      var keys    = Object.keys(obj);

      keys.forEach(function (key) {
        objNode.setAttribute(key, obj[key]);
      });

  function insertToDoc(script, where) {
    where = where || 'body';

var Util = (function () {
    function sortId(a, b) {
        if (a.id < b.id) return -1;
        if (a.id > b.id) return 1;
        return 0;
    }

    function blurAndFocus(focusedNode, targetNode) {
        if (focusedNode === targetNode) {
            DEBUG && console.log('Util - blurAndFocus: current focused node and target node is same!');
            return;
        }

        !focusedNode && DEBUG && console.log('Util - blurAndFocus: Current focused node is not defined!');
        focusedNode && focusedNode.classList.remove('selected');
        targetNode && targetNode.classList.add('selected');
    }

    function positionOverlay(overlayNode, targetNode) {
        if (overlayNode && targetNode) {
            overlayNode.style.left = targetNode.offsetLeft + 'px';
        }
    }

    return {
        sortId         : sortId,
        blurAndFocus   : blurAndFocus,
        positionOverlay: positionOverlay
    };
})();


var VideoTracker = (function () {
    "use strict";
    var VideoTrackerCues = {
        videoStartTracker: 0,
        firstQuartileTracker: 1,
        midpointTracker: 2,
        thirdQuartileTracker: 3
    };
    var movie = document.getElementsByTagName('video')[0],
        logBoard = document.getElementById('log'),
        trackerCueList = { id: null },
        videosComplete = [],
        payload;

    for (var prop in VideoTrackerCues) {
        trackerCueList[prop] = {};
    }

    movie.addEventListener('loadedmetadata', function () {
        _setUpTrackerCues();
    });

    movie.addEventListener('timeupdate', function () {
        var videoTime = this.currentTime;

        for (var key in VideoTrackerCues) {
            if (!trackerCueList[key].sent && (videoTime >= trackerCueList[key].atTime)) {
                trackerCueList[key].sent = true;
                _trackVideo(key, videoTime);
                break;
            }
        }
    });

    movie.addEventListener('ended', function () {
        trackEndEvent();
    });


    function setVideoPayload(pl) {
        payload = pl;
    }

    function trackClickEvent() {
        if (videosComplete.indexOf(payload.id) === -1) {
            _trackVideo('clickTracker');
        }
    }

    function trackEndEvent() {
        if (videosComplete.indexOf(payload.id) === -1) {
            _trackVideo('completeTracker');
            videosComplete.push(payload.id);
        }
    }

    function trackReplayEvent() {
        for (var prop in VideoTrackerCues) {
            trackerCueList[prop].sent = false;
        }

        _trackVideo('replayTracker');
    }

    function _setUpTrackerCues() {
        var cueLength = movie.duration / 4;
        var multiplier;
        trackerCueList.id = payload.id;

        for (var prop in VideoTrackerCues) {
            switch (prop) {
                case 'videoStartTracker':
                    multiplier = 0;
                    break;
                case 'firstQuartileTracker':
                    multiplier = 1;
                    break;
                case 'midpointTracker':
                    multiplier = 2;
                    break;
                case 'thirdQuartileTracker':
                    multiplier = 3;
            }

            trackerCueList[prop]['atTime'] = multiplier ? (cueLength * multiplier) : 0.001;
            trackerCueList[prop]['sent'] = false;
        }
    }

    function _trackVideo(type, videoTime) {
        if (videosComplete.indexOf(payload.id) !== -1 && type !== 'replayTracker') { return; }

        try {
            var urls = [];

            payload.tracking.forEach(function(tracker) {
                tracker && urls.push(tracker[type]);
            });

            var xhrs = [];
            urls.forEach(function (url) {
                if (url) {
                    var trackerReq = new XMLHttpRequest();
                    xhrs.push(trackerReq);
                    trackerReq.open('GET', url, true);
                    trackerReq.onreadystatechange = function () {
                        if (trackerReq.readyState === 4 && trackerReq.status === 200) {
                            _logEvent('VideoTracker sent at time: ' + videoTime);
                            _logEvent('VideoTracker URL: ' + url);
                        }
                    };
                    trackerReq.send();
                }
            });
        } catch (e) {
            _logEvent('VideoTracker _trackVideo - Error occurred! ' + e.message);
        }
    }

    function _logEvent(message) {
        DEBUG && console && console.log('VideoTracker _logEvent: ', message);
        if (!logBoard || logBoard.style.display === 'none') { return; }

        var pNode = document.createElement('p');
        pNode.appendChild(document.createTextNode(message));
        logBoard.insertBefore(pNode, logBoard.firstChild);
    }

    return {
        setVideoPayload : setVideoPayload,
        trackClickEvent  : trackClickEvent,
        trackEndEvent   : trackEndEvent,
        trackReplayEvent: trackReplayEvent
    };
})();


var VideoControls = (function () {
    "use strict";

    var videoContainer      = document.querySelector('.videoContainer');
    var videoTag            = document.getElementById('videoPlayerBox');
    var videoControl        = document.getElementById('videoControl');
    var playElement         = document.getElementById('playBtn');
    var pauseElement        = document.getElementById('pauseBtn');
    var progressBar         = document.getElementById('progressBar');
    var videoDuration       = document.getElementById('videoDuration');
    var videoDurationStr    = '00:00:00';
    var videoCurrentTime    = document.getElementById('videoCurrentTime');
    var videoCurrentTimeStr = '00:00:00';
    var videoLength         = document.getElementById('videoLength');
    var fastSpeedIndicator  = document.getElementById('fastSpeedIndicator');
    var forwardIcon         = document.getElementById('forwardIcon');
    var rewindIcon          = document.getElementById('rewindIcon');
    var _isFullScreen       = false;
    var _isPlaying          = true;  // TODO: remove this flag!
    var isForward           = false;
    var isRewind            = false;
    var repeatForward;      // NOTE: forward and rewind flags can't be shared!  Shared var has
    var repeatRewind;       // funny behavior when rewind and forward immediately after each other.

    function handleController(isHideVideoControl) {
        // isHideVideoControl - should hide Video Controller?
        var controlOpt = MicrositeNav.getCurrentActiveElem().id;
        DEBUG && console.log('VideoControls - handleController, control id: ', controlOpt);

        switch (controlOpt) {
            case 'fullscreen':
                toggleFullScreen(isHideVideoControl);
                break;
            case 'playpause':
                if (repeatForward || repeatRewind) {
                    changePauseToPlay();
                } else if (videoTag.paused) {
                    changePauseToPlay();
                } else {  /* _isPlaying */
                    changePlayToPause();
                }
                break;
            case 'rewind':
                handleRewind();
                break;
            case 'forward':
                handleForward();
        }
    }

    function handleForward() {
        if (!payload.fastSpeed) {
            return;
        }

        DEBUG && console.log('VideoControls - handleForward ....');
        changePlayToPause();
        stopFastSpeed();
        isForward = true;
        isRewind  = false;
        isShowfastSpeedIndicator(true);
        forwardIcon.style.display = 'block';
        rewindIcon.style.display  = 'none';

        // Move the focus to play/pause button.  Assume play button is in the middle of video controller!
        MicrositeNav.moveLeftRight('left');

        repeatForward = setInterval(function () {
            // Check current status still forwarding.  Otherwise this timer function will interfere rewinding!
            if (isForward) {
                var forwardToTime = videoTag.currentTime;
                flashFastSpeedIndicator();
                forwardToTime += payload.fastSpeed;

                if (forwardToTime >= videoTag.duration) {
                    forwardToTime = videoTag.duration - 9.0;
                    changePauseToPlay();
                }

                videoTag.currentTime = forwardToTime;
                DEBUG && console.log('Forward video to time: ', videoTag.currentTime);
            }
        }, 500);
    }

    function handleRewind() {
        if (!payload.fastSpeed) {
            return;
        }

        DEBUG && console.log('VideoControls - handleRewind ....');
        changePlayToPause();
        stopFastSpeed();
        isRewind  = true;
        isForward = false;
        isShowfastSpeedIndicator(true);
        rewindIcon.style.display  = 'block';
        forwardIcon.style.display = 'none';

        // Move the focus to play/pause button.  Assume play button is in the middle of video controller!
        MicrositeNav.moveLeftRight('right');

        repeatRewind = setInterval(function () {
            // Check current status still rewinding.  Otherwise this timer function will interfere forwarding!
            if (isRewind) {
                var rewindToTime = videoTag.currentTime;
                flashFastSpeedIndicator();
                rewindToTime -= payload.fastSpeed;

                if (rewindToTime <= 0) {
                    rewindToTime = 0;
                    changePauseToPlay();
                }

                videoTag.currentTime = rewindToTime;
                DEBUG && console.log('Rewind video to time: ', videoTag.currentTime);
            }
        }, 500);
    }


    function isShowfastSpeedIndicator(isShow) {
        fastSpeedIndicator.style.display = isShow? 'block' : 'none';
    }

    function flashFastSpeedIndicator() {
        if (fastSpeedIndicator.classList.contains('flash')) {
            fastSpeedIndicator.classList.remove('flash');
        } else {
            fastSpeedIndicator.classList.add('flash');
        }
    }

    function changePlayToPause() {
        if (videoTag.paused) return;
        // if (!_isPlaying) return;
        DEBUG && console.log('VideoControls - changePlayToPause .... ');
        videoTag.pause();
        _isPlaying = false;

        if (videoControl) {
            pauseElement.classList.remove('inActive');
            playElement.classList.add('inActive');
        }
    }

    function changePauseToPlay() {
        if (!videoControl || !videoTag.paused) return;
        stopFastSpeed();
        videoTag.play();
        playElement.classList.remove('inActive');
        pauseElement.classList.add('inActive');
        _isPlaying = true;
    }

    function stopFastSpeed() {
        if (repeatForward || repeatRewind) {
            DEBUG && console.log('VideoControls - stopFastSpeed ....');
            isShowfastSpeedIndicator(false);
            clearInterval(repeatForward);
            clearInterval(repeatRewind);
            repeatForward = null;
            repeatRewind  = null;
            isForward     = false;
            isRewind      = false;
        }
    }

    function onVideoDurationChange() {
        DEBUG && console.log('VideoControls - onVideoDurationChange, video duration: ', videoTag.duration);
        videoDurationStr = formateVideoTimeString(videoTag.duration);

        if (videoLength) {
            videoLength.textContent = videoDurationStr;
        }
    }

    // Note: This function is for debugging called from HTML file!
    // function getVideoCurrentTimeText() {
    //     return videoCurrentTime.textContent;
    // }

    function resetProgressBarCSS() {
        progressBar.style.webkitAppearance = 'none';
    }

    function updateProgressBar() {
        // Updates progress bar with percentage played and timer
        if (videoTag.currentTime > 0.1) {
            progressBar.value = videoTag.currentTime / videoTag.duration * 100.0;
            videoCurrentTimeStr = formateVideoTimeString(videoTag.currentTime);

            if (videoDuration) {
                videoDuration.textContent = videoCurrentTimeStr + ' / ' + videoDurationStr;
            } else {
                videoCurrentTime.textContent = videoCurrentTimeStr;
            }
        }
    }

    function formateVideoTimeString(timeInSec) {
        var hours = Math.floor(timeInSec / 3600);
        var minutes = Math.floor((timeInSec - hours * 3600) / 60);
        var seconds = Math.floor(timeInSec - (hours * 3600) - (minutes * 60));

        if (hours < 10) {
            hours = '0' + hours;
        }
        if (minutes < 10) {
            minutes = '0' + minutes;
        }
        if (seconds < 10) {
            seconds = '0' + seconds;
        }

        return (hours + ':' + minutes + ':' + seconds);
    }

    function toggleVidControls(visible) {
        if (!videoControl) {
            return;
        }

        if (isForward || isRewind) {
            videoControl.style.visibility = 'visible';
        } else if (visible) {
            videoControl.style.visibility = 'visible';
        } else if (visible === false) {
            videoControl.style.visibility = 'hidden';
        } else if (videoControl.style.visibility === 'visible') {
            // toggle when no param 'visible' is passed (non-force visible case)
            videoControl.style.visibility = 'hidden';
        } else {
            videoControl.style.visibility = 'visible';
        }

        if (videoControl.style.visibility === 'visible') {
            MicrositeNav.setFocusToVideoControl();
            setTimeout(function () {
                toggleVidControls(false);
            }, 5000);
        }
    }

    function isFullScreen() {
        return _isFullScreen;
    }

    function toggleFullScreen(isHideVideoControl) {
        DEBUG && console.log('VideoControls - toggleFullScreen, isHideVideoControl: ', isHideVideoControl);
        if (_isFullScreen) {
            _goInsetScreen(isHideVideoControl);
        } else {
            _goFullScreen(isHideVideoControl);
        }
    }

    function _goFullScreen(isHideVideoControl) {
        _isFullScreen = true;
        videoContainer.classList.add('stateFullScreen');
        toggleVidControls(!isHideVideoControl);
    }

    function _goInsetScreen(isHideVideoControl) {
        // Hide Video Controls only if isHideVideoControl = true!
        _isFullScreen = false;
        videoContainer.classList.remove('stateFullScreen');
        toggleVidControls(!isHideVideoControl);
        MicrositeVideoHandler.triggerShowNowPlaying(false);
    }

    return {
        handleController     : handleController,
        onVideoDurationChange: onVideoDurationChange,
        updateProgressBar    : updateProgressBar,
        resetProgressBarCSS  : resetProgressBarCSS,
        isFullScreen         : isFullScreen,
        toggleFullScreen     : toggleFullScreen,
        toggleVidControls    : toggleVidControls,
        changePauseToPlay    : changePauseToPlay,
        changePlayToPause    : changePlayToPause,
        handleRewind         : handleRewind,
        handleForward        : handleForward
    };
})();


var MicrositeTracking = (function () {
    var startTime = new Date();

    function pageTracking(typeOfPageTracking, exitRoute) {
        var trackLinks;

        if (exitRoute) {
            trackLinks = addQuery('exit_route', exitRoute, getTrackLinks(payload.tracking, typeOfPageTracking));
        } else {
            trackLinks = getTrackLinks(payload.tracking, typeOfPageTracking);
        }

        trackLinks.forEach(function (trackLink) {
            if (typeof trackLink === 'string' && trackLink.length) {
                callXHR(trackLink, 'page tracking');
            }
        });
    }

    function appClickTracking(appId) {
        // Sends XHR GET calls to server for app click tracking for specific appId
        var appToTrack = payload.apps.filter(function (appObj) {
            return appObj.id === appId;
        })[0];

        var trackLinks = getTrackLinks(appToTrack.tracking, 'clickTracker');

        trackLinks.forEach(function (trackLink) {
            if (typeof trackLink === 'string' && trackLink.length) {
                callXHR(trackLink, 'app click tracking');
            }
        });
    }

    function timeSpentTracking() {
        // Sends XHR GET calls to server for time spent on microsite tracking
        var endTime    = new Date();
        var trackLinks = getTrackLinks(payload.tracking, 'micrositeTimeSpent');

        trackLinks.forEach(function (trackLink) {
            if (typeof trackLink === 'string' && trackLink.length) {
                callXHR(trackLink + '&t=' + (endTime - startTime), 'time spent tracking');
            }
        });
    }

    ///////////////////
    //Helper functions/
    //////////////////
    function getTrackLinks(payloadTracking, keyword) {
        // Gets all track links from payload for a specific key
        var trackLinks = [];
        var trackLink;
        payloadTracking.forEach(function (trackObj) {
            trackLink = trackObj[keyword];
            if (trackLink && trackLink.length) {
                trackLinks.push(trackObj[keyword]);
            }
        });

        return trackLinks;
    }

    function callXHR(url, logLabel) {
        var xhttp = new XMLHttpRequest();

        xhttp.open("GET", url, true);
        xhttp.send();

        xhttp.onreadystatechange = function () {
            if (xhttp.readyState === 4 && ((xhttp.status >= 200 && xhttp.status < 300) || xhttp.status === 304)) {
                DEBUG && console.log(logLabel + ' succeed: ', xhttp);
            }
        };
    }

    function addQuery(queryKey, queryValue, trackLinks) {
        // Adds query params to tracking URLs.
        var separator;
        var re = new RegExp("([?&])" + queryKey + "=.*?(&|$)", "i");

        return trackLinks.map(function (trackLink) {
            separator = trackLink.indexOf('?') !== -1 ? "&" : "?";
            if (trackLink.match(re)) {
                return trackLink.replace(re, '$1' + queryKey + "=" + queryValue + '$2');
            }
            else {
                return trackLink + separator + queryKey + "=" + queryValue;
            }
        });
    }

    return {
        pageTracking     : pageTracking,
        appClickTracking : appClickTracking,
        timeSpentTracking: timeSpentTracking
    };
})();


var MicrositeNav = (function () {
    // Handles navigation for top-bottom layout in microsite template
    var nav;

    function createNavMap(screen) {
        var dataSections = screen ? screen.querySelectorAll('div[data-section]') :
            document.querySelectorAll('div[data-section]');
        nav = {
            sections         : [],
            currentSection   : '',
            currentFocusedIdx: 0
        };

        if (DEBUG) {
            console.log('MicrositeNav - createNavMap, payload: ', payload);
            console.log('MicrositeNav - createNavMap, parent object: ', screen);
            console.log('MicrositeNav - createNavMap, nav object: ', nav);
            console.log('MicrositeNav - createNavMap, data sections: ', dataSections);
        }

        for (var i = 0; i < dataSections.length; i++) {
            var section = dataSections[i].dataset.section;
            nav.sections.push(dataSections[i]);
            nav[section] = [];

            switch(section) {
                case NavSections.Videos:
                    // Fill in nav.videos with corresponding DOM elements
                    var payloadVids = payload.videos;
                    payloadVids.sort(Util.sortId);
                    payloadVids.forEach(function (vidObj) {
                        nav[section].push(document.getElementById(vidObj.id));
                    });

                    //Delete unused DOM elements out of navigation array.
                    switch (nav[section].length) {
                        case 0:  // Remove video player box and video thumbnails.
                            var vIndex = findIndexOfSection(NavSections.VideoPlayerBox);
                            (vIndex !== -1) && nav.sections.splice(vIndex, 1);
                            document.querySelector('.videoContainer').style.visibility = 'hidden';
                        case 1:  // Remove video thumbnails.
                            nav.sections.pop();
                            break;
                        default:
                            removeUnusedThumbnails(dataSections[i]);
                    }
                    break;
                case NavSections.Apps:
                    //Fill in nav.apps with corresponding DOM elements
                    var payloadApps = payload.apps;
                    payloadApps.sort(Util.sortId);
                    payloadApps.forEach(function (appObj) {
                        var currentApp = document.getElementById(appObj.id);
                        nav[section].push(currentApp);
                    });

                    //Delete or Hide unused DOM elements
                    if (nav[section].length === 0) {
                        DEBUG && console.log('MicrositeNav createNavMap - no apps!  Remove app thumbnail container!');
                        nav.sections.pop();
                        var appThumbnails = dataSections[i].getElementsByTagName('img');
                        for (var j = 0; j < appThumbnails.length; j++) {
                            appThumbnails[j].style.visibility = 'hidden';
                        }
                    } else {
                        removeUnusedThumbnails(dataSections[i]);
                    }
                    break;
                default:
                    var navigableObj = dataSections[i].getElementsByClassName('navigable');
                    var k;
                    DEBUG && console.log('MicrositeNav createNavMap - default, navigableObj: ', navigableObj);
                    for (k = 0; k < navigableObj.length; k++) {
                        nav[section].push(navigableObj[k]);
                    }
            }
        }

        // Set default focus when Microsite is loaded initially.  Template can overwrite the default.
        if (findIndexOfSection(NavSections.Consent) !== -1) {
            setFocusToConsent();
        } else if (findIndexOfSection(NavSections.WatchNow) !== -1) {
            setFocusToWatchNow();
        } else if (findIndexOfSection(NavSections.PlayerButtons) !== -1) {
            shiftFocusTo(NavSections.PlayerButtons);
        } else if ((findIndexOfSection(NavSections.Videos) !== -1) && nav[NavSections.Videos].length > 1) {
            shiftFocusTo(NavSections.Videos);
        } else if (findIndexOfSection(NavSections.VideoPlayerBox) !== -1) {
            shiftFocusTo(NavSections.VideoPlayerBox);
        } else if (findIndexOfSection(NavSections.Apps) !== -1) {
            shiftFocusTo(NavSections.Apps);
        } else if (findIndexOfSection(NavSections.Exit) !== -1) {
            shiftFocusTo(NavSections.Exit);
        }

        DEBUG && console.log('MicrositeNav - createNavMap completed.  nav object: ', nav);
    }

    function moveUpDown(direction) {
        if (nav.sections.length < 2) {
            return;
        }

        var index = findIndexOfSection(getCurrentSection());

        if (index === -1) return;

        var focusNode = getCurrentActiveElem();
        var targetSection;

        if (DEBUG) {
            console.log('moveUpDown - element has focus previously: ', focusNode);
            console.log('moveUpDown - section index: ', index);
        }

        if (!VideoControls.isFullScreen()) {
            switch (direction) {
                case 'down':
                    if (index === (nav.sections.length - 1)) {
                        return;
                    } else {
                        targetSection = index + 1;
                    }
                    break;
                case 'up':
                    if (index === 0) {
                        return;
                    } else {
                        targetSection = index - 1;
                    }
            }

            nav.currentSection = nav.sections[targetSection].dataset.section;
            nav.currentFocusedIdx = 0;
            Util.blurAndFocus(focusNode, (nav[nav.currentSection])[nav.currentFocusedIdx]);
        }

        if (DEBUG) {
            console.log('moveUpDown - section has focus now: ', getCurrentSection());
            console.log('moveUpDown - element has focus now: ', getCurrentActiveElem());
        }
    }

    function moveLeftRight(direction) {
        var navSection = nav[nav.currentSection];
        var focusNode = navSection[nav.currentFocusedIdx];

        if (navSection.length > 0) {
            switch (direction) {
                case 'right':
                    if (nav.currentFocusedIdx < (navSection.length - 1)) {
                        nav.currentFocusedIdx++;
                    }
                    break;
                case 'left':
                    if (nav.currentFocusedIdx > 0) {
                        nav.currentFocusedIdx--;
                    }
            }

            DEBUG && console.log('MicrositeNav - move to ' + direction + ' in section: ', nav.currentSection);
            Util.blurAndFocus(focusNode, navSection[nav.currentFocusedIdx]);
        }
    }

    function getCurrentActiveElem() {
        // if (DEBUG) {
        //     console.log('MicrositeNav - getCurrentActiveElem .... Current section: ', nav.currentSection);
        //     console.log('current navigation section: ', nav[nav.currentSection]);
        //     console.log('current focused index: ', nav.currentFocusedIdx);
        // }

        return (nav[nav.currentSection] ? nav[nav.currentSection][nav.currentFocusedIdx] : null);
    }

    function getCurrentSection() {
        return nav.currentSection;
    }

    function setFocusToVideoControl() {
        // Note: Specify a button element with CSS class name, 'navControlFocus', to set focus initially.
        // Default is the first element!
        var btns = document.getElementsByClassName('playerButton');

        if (btns.length === 0) {
            DEBUG && console.log('MicrositeNav - setFocusToVideoControl(), no player buttons found @ video controller!');
            return;
        }

        var btn = btns[0];
        var focusIndex = 0;

        for (var i = 0; i < btns.length; i++) {
            if (btns[i].classList.contains('navControlFocus')) {
                btn = btns[i];
                focusIndex = i;
                break;
            }
        }

        if (DEBUG) {
            console.log('MicrositeNav - setFocusToVideoControl(), current control focus, btn: ', btn);
            console.log('MicrositeNav - setFocusToVideoControl(), index: ', focusIndex);
        }

        shiftFocusTo(NavSections.PlayerButtons, focusIndex);
    }

    function setFocusToWatchNow() {
        DEBUG && console.log('MicrositeNav - setFocusToWatchNow ... ');
        shiftFocusTo(NavSections.WatchNow, 0);
    }

    function setFocusToVideos(index) {
        DEBUG && console.log('MicrositeNav - setFocusToVideos, video index: ', index);
        shiftFocusTo(NavSections.Videos, index);
    }

    function setFocusToVideoPlayer() {
        DEBUG && console.log('MicrositeNav - setFocusToVideoPlayer ...');
        shiftFocusTo(NavSections.VideoPlayerBox);
    }

    function setFocusToApps(index) {
        DEBUG && console.log('MicrositeNav - setFocusToApps, apps index: ', index);
        shiftFocusTo(NavSections.Apps, index);
    }

    function setFocusToInput() {
        DEBUG && console.log('MicrositeNav - setFocusToInput ...');
        shiftFocusTo('user-input');
    }

    function setFocusToConsent(index) {
        DEBUG && console.log('MicrositeNav - setFocusToConsent ...');
        shiftFocusTo(NavSections.Consent, index);
    }

    function setFocusToTnC() {
        DEBUG && console.log('MicrositeNav - setFocusToTnC modal dialog ...');
        shiftFocusTo('tnc-consent');
    }

    function setFocusToInputAction(anId) {
        // Used in SMS template.
        // Note: JavaScript at 2016 TV does not support array.findIndex()!!
        // var index = nav['respond-actions'].findIndex(function(obj) {
        //     return (obj.id === anId);
        // });
        // index = (index > -1) ? index : 0;
        var i;

        for (i = 0; i < nav['respond-actions'].length; i++) {
            if (nav['respond-actions'][i].id === anId) { break; }
        }

        DEBUG && console.log('MicrositeNav - setFocusToInputAction "' + anId + '", index: ', i);
        shiftFocusTo('respond-actions', i);
    }

    ///////////////////
    //Helper functions/
    //////////////////
    function findIndexOfSection(id) {
        // Note: JavaScript at 2016 TV does not support array.findIndex()!!
        // return nav.sections.findIndex(function (obj) {
        //     return (obj.dataset.section === id);
        // });
        for (var i = 0; i < nav.sections.length; i++) {
            if (nav.sections[i].dataset.section === id) { return i; }
        }

        return -1;
    }

    function shiftFocusTo(section, index) {
        if (!nav[section]) {
            console.log('MicrositeNav - shiftFocusTo, section does not exist in navigation map: ', section);
            return;
        }

        var priorFocus = getCurrentActiveElem();

        if (priorFocus) {
            priorFocus.classList.remove('selected');
        }

        nav.currentSection = section;
        nav.currentFocusedIdx = index || 0;
        nav[nav.currentSection][nav.currentFocusedIdx].classList.add('selected');
        DEBUG && console.log('MicrositeNav - shiftFocusTo: ' , nav[nav.currentSection][nav.currentFocusedIdx]);
    }

    function removeUnusedThumbnails(currentNavSection) {
        var thumbnails       = currentNavSection.getElementsByTagName('img');
        var section          = currentNavSection.dataset.section;
        var unusedThumbnails = [];
        var ids              = [];
        var sectionObjs      = payload[section];

        sectionObjs.forEach(function (obj) {
            ids.push(obj.id);
        });

        for (var ii = 0; ii < thumbnails.length; ii++) {
            if (ids.indexOf(thumbnails[ii].id) === -1) {
                unusedThumbnails.push(thumbnails[ii]);
            }
        }

        unusedThumbnails.forEach(function (thumbnail) {
            currentNavSection.removeChild(thumbnail);
        });
    }

    return {
        createNavMap          : createNavMap,
        moveUpDown            : moveUpDown,
        moveLeftRight         : moveLeftRight,
        getCurrentActiveElem  : getCurrentActiveElem,
        getCurrentSection     : getCurrentSection,
        setFocusToVideoControl: setFocusToVideoControl,
        setFocusToWatchNow    : setFocusToWatchNow,
        setFocusToVideos      : setFocusToVideos,
        setFocusToVideoPlayer : setFocusToVideoPlayer,
        setFocusToApps        : setFocusToApps,
        setFocusToConsent     : setFocusToConsent,
        setFocusToInputAction : setFocusToInputAction,
        setFocusToInput       : setFocusToInput,
        setFocusToTnC         : setFocusToTnC,
        shiftFocusTo          : shiftFocusTo
    };
})();


var MicrositeVideoHandler = (function () {
    var currentVidId;
    var currentVideoIndex     = 0;   // index of vidIds / videos array
    var titleAppearanceLength = 5000;
    var videoTag              = document.getElementsByTagName('video')[0];
    var titleOverlay          = document.getElementById('titleOverlay');
    var movieTitle            = document.getElementById('movieTitle');
    var videoThumbnails       = document.getElementsByClassName('videoThumbnails')[0];
    var videos                = payload.videos;
    var videoOn               = true;
    var vidIds                = [];
    var nowPlayingStatus      = document.getElementById('nowPlayingOverlay');

    function initAutoplay(isBrowserMode) {
        if (DEBUG) {
            console.log('MicrositeVideoHandler - initAutoplay(), videos: ', videos);
            console.log('  Is microsite running in Browser: ', isBrowserMode);
        }

        if (!videos || !videos.length) {
            return;
        }

        payload.fastSpeed = payload.fastSpeed || 10;
        Util.positionOverlay(titleOverlay, videoTag);

        videos.forEach(function (videoObj) {
            vidIds.push(videoObj.id);
            if (isBrowserMode && videoObj.mp4Url) {
                videoObj.vidUrl = videoObj.mp4Url;
            }
        });

        // Update source of video_tag, and set up video trackers.
        currentVidId = videos[currentVideoIndex].id;
        videoTag.firstElementChild.setAttribute('src', getVidUrl(currentVidId, videos));
        videoTag.load();
        videoOn = true;
        VideoTracker.trackClickEvent();
        toggleTitle(currentVidId, videos, titleOverlay);

        if (videos.length > 1) {
            showNowPlaying(nowPlayingStatus, videoThumbnails, false);
        } else if (videoThumbnails) {
            // Hide the video thumbnail if there is only one video.
            if (nowPlayingStatus) {
                videoThumbnails.removeChild(nowPlayingStatus);
                nowPlayingStatus = null;
            }

            videoThumbnails.style.display = 'none';
        }
    }

    function handleVideo(input) {
        DEBUG && console.log('MicrositeVideoHandler - handleVideo, input: ', input);

        switch(input) {
            case (currentVidId):
                break;
            case 'replay':
                setTimeout(function () {
                    videoTag.currentTime = 0;
                    VideoTracker.trackReplayEvent();
                    playVideo();
                }, 3000);
                break;
            case undefined:
            case null:
                // when just click select to play or pause video
                videoOn ? pauseVideo() : playVideo();
                break;
            default:
                var replayFlag = false;

                if (input === 'next') {
                    var nextIndex = vidIds.indexOf(currentVidId) + 1;
                    replayFlag = (nextIndex >= vidIds.length);
                    currentVideoIndex = (nextIndex < vidIds.length) ? nextIndex : 0;
                    currentVidId = vidIds[currentVideoIndex];
                } else {
                    currentVidId = input;
                    currentVideoIndex = vidIds.indexOf(currentVidId);
                }

                setTimeout(function () {
                    videoTag.firstElementChild.setAttribute('src', getVidUrl(currentVidId, videos));
                    videoTag.load();
                    replayFlag && VideoTracker.trackReplayEvent();
                    playVideo();
                    showNowPlaying(nowPlayingStatus, videoThumbnails, false);
                    VideoControls.changePauseToPlay();
                }, 2000);
        }

        toggleTitle(currentVidId, videos, titleOverlay);
    }

    function whichVideoIsPlayed() {
        return (currentVideoIndex + 1);
    }

    function whichVideoIdIsPlayed() {
        return currentVidId;
    }

    function triggerShowNowPlaying(isFocusOnVidThumbnail) {
        if (videos.length > 1) {
            showNowPlaying(nowPlayingStatus, videoThumbnails, isFocusOnVidThumbnail);
        }
    }

    //////////////////////
    // Helper functions //
    /////////////////////
    function playVideo() {
        var playPromise = videoTag.play();
        videoOn = true;
        DEBUG && console.log('MicrositeVideoHandler - playVideo, playPromise: ', playPromise);

        if (playPromise) {
            playPromise.then(function () {
                VideoTracker.trackClickEvent();
            }).catch(function (error) {
                videoOn = false;
                console.error('MicrositeVideoHandler - fail to play video: ' + currentVidId + '!  Error: ', error);
            });
        } else {
            VideoTracker.trackClickEvent();
        }
    }

    function pauseVideo() {
        videoTag.pause();
        videoOn = false;
    }

    /**
     * Shows 'Now Playing' overlay over video thumbnails
     * @param {HTMLElement} nowPlayingStatus
     * @param {HTMLElement} videoThumbnailsNode
     * @param {Boolean} isFocusOnVidThumbnail - force focus to current video thumbnail
     */
    function showNowPlaying(nowPlayingStatus, videoThumbnailsNode, isFocusOnVidThumbnail) {
        if (nowPlayingStatus && videoThumbnailsNode) {
            isFocusOnVidThumbnail && MicrositeNav.setFocusToVideos(currentVideoIndex);
            Util.positionOverlay(nowPlayingStatus, document.getElementById(currentVidId));
        }
    }

    function toggleTitle(currentVidId, videoArray, titleOverlay) {
        var videoTitle = videoArray.filter(function (vidObj) {
            return vidObj.id === currentVidId;
        })[0]["vidTitle"];

        if (movieTitle) {
            movieTitle.innerHTML = videoTitle;
        }

        if (titleOverlay) {
            titleOverlay.textContent = videoTitle;
            titleOverlay.classList.remove('fadeOut');
            titleOverlay.classList.add('fadeIn');
            setTimeout(function () {
                titleOverlay.classList.remove('fadeIn');
                titleOverlay.classList.add('fadeOut');
            }, titleAppearanceLength);
        }
    }

    function getVidUrl(vidId, videoArray) {
        // Note: 2015 TV does not support Array.find()!!!
        var video = videoArray.filter(function (videoObj) {
            return videoObj.id === vidId;
        })[0];
        VideoTracker.setVideoPayload(video);
        return video.vidUrl;
    }

    return {
        initAutoplay: initAutoplay,
        whichVideoIsPlayed: whichVideoIsPlayed,
        whichVideoIdIsPlayed: whichVideoIdIsPlayed,
        handleVideo: handleVideo,
        triggerShowNowPlaying: triggerShowNowPlaying
    };

var MicrositeUserInput = (function () {
    var httpService = new XMLHttpRequest();
    var templateCallBack;
    var smsTimeout = true;

    httpService.responseType = 'json';
    httpService.timeout      = 2000;

    httpService.onreadystatechange = function () {
        smsTimeout = false;

        if (httpService.readyState === XMLHttpRequest.DONE) {
            if ((httpService.status < 200) || (httpService.status >= 300)) {
                console && console.log('MicrositeUserInput - request failed!', httpService);
            }

            DEBUG && console.log('MicrositeUserInput - request sent.', httpService);
            triggerTemplateCallBack(httpService.response);
        }
    };

    httpService.onerror = function (error) {
        console && console.log('MicrositeUserInput - request transaction encountered error: ', error);
        console && console.log('httpService:', httpService);
        smsTimeout = false;
        triggerTemplateCallBack(httpService.response);
    };

    httpService.ontimeout = onTimeout;

    function onTimeout (error) {
        console && console.log('MicrositeUserInput - request timed out!  Error: ', error);
        console && console.log('httpService:', httpService);
        smsTimeout = false;
        triggerTemplateCallBack(httpService.response);
    }

    function registerTemplateCallBack(callBack) {
        templateCallBack = callBack;
    }

    function sendSMS(phoneNumber) {
        var apiUrl = payload.serverUrl + 'sms';
        var smsObj = {
            adId       : payload.adId,
            psid       : payload.psid,
            countryCode: payload.userInput.countryCode,
            language   : payload.userInput.language,
            message    : payload.userInput.smsText,
            toNumber   : phoneNumber
        };

        callRequest(smsObj, apiUrl);
    }

    function callRequest(requestBody, apiUrl) {
        DEBUG && console.log('MicrositeUserInput - callRequest, request object: ', requestBody);
        httpService.open("POST", apiUrl);  // asynchronous call!
        httpService.setRequestHeader('Content-Type', 'application/json;charset=UTF-8');
        httpService.setRequestHeader('Accept', 'application/json, text/plain, */*');
        httpService.send(JSON.stringify(requestBody));

        smsTimeout = setTimeout(function () {
            if (smsTimeout) {
                onTimeout('Microsite client timed out!');
            }
        }, 3000);
    }

    function triggerTemplateCallBack(response) {
        if (!templateCallBack) {
            return;
        }

        // Server responds with code 100 for invalid phone number, 101 for other errors.
        var resJSON = null;

        if (response) {
            // Note: 2016 TV's Ad Agent gives http respond as a string and need to parse response into JSON object.
            resJSON = (typeof response === 'string') ? JSON.parse(response) : response;
        }

        templateCallBack(resJSON ? resJSON.code : 101,
            resJSON ? resJSON.message : null);
    }

    return {
        registerTemplateCallBack: registerTemplateCallBack,
        sendSMS: sendSMS
    };
})();

                        case 38:   // UP arrow keys
                        case 29460:
                            if (buttonWatchNow) {
                                flashWatchButton();
                            } else {
                                window.$SAMSUNG.MicrositeNav.moveUpDown('up');
                            }
                            break;
                        case 5:    // RIGHT arrow keys
                        case 39:
                            if (buttonWatchNow) {
                                flashWatchButton();
                            } else {
                                window.$SAMSUNG.logEvent('Move navigation RIGHT in ' + window.$SAMSUNG.MicrositeNav.getCurrentSection());
                                window.$SAMSUNG.MicrositeNav.moveLeftRight('right');
                            }
                            break;
                        case 4:    // LEFT arrow keys
                        case 37:
                            if (buttonWatchNow) {
                                flashWatchButton();
                            } else {
                                window.$SAMSUNG.logEvent('Move navigation LEFT in ' + window.$SAMSUNG.MicrositeNav.getCurrentSection());
                                window.$SAMSUNG.MicrositeNav.moveLeftRight('left');
                            }
                    }
                }
            }

            /**
             * helper function getAppDetails
             * @param {string} appId
             */
            function getAppDetails(appId) {
                var apps = payload.apps;
                var app  = apps.filter(function (appObj) {
                    return appObj.id === appId;
                });

                window.$SAMSUNG.logEvent('getAppDetails .... app: ' + JSON.stringify(app[0]));

                return {
                    appid   : app[0].appId,
                    type    : app[0].runType,
                    deeplink: (app[0].deepLink ? app[0].deepLink : '')
                };
            }

            function handleEnterEvent(focusedElem, isFullScreen) {
                var exitRoute       = window.$SAMSUNG.CONSTANTS.ExitRoute;
                var selectedSection = window.$SAMSUNG.MicrositeNav.getCurrentSection();
                window.$SAMSUNG.logEvent('handleEnterEvent - current focus section: ' + selectedSection);

                switch (selectedSection) {
                    case window.$SAMSUNG.NavSections.WatchNow:
                        if (buttonWatchNow.firstElementChild && buttonWatchNow.firstElementChild.textContent === ExitString) {
                            window.$SAMSUNG.logEvent('Exit button is pressed.  Microsite exits!!');
                            window.$SAMSUNG.closeMicrosite(exitRoute.pageExitButton);
                        } else {
                            if (videoPlayerBox.currentTime >= videoPlayerBox.duration) {
                                window.$SAMSUNG.MicrositeVideoHandler.handleVideo('replay');
                            }

                            window.$SAMSUNG.MicrositeVideoControls.toggleFullScreen(isFullScreen);
                            keyFocusAnchor.focus();
                        }
                        break;
                    case window.$SAMSUNG.NavSections.VideoPlayerBox:
                        if (isFullScreen) {
                            break;
                        } else if (isInitFullScreen) {
                            window.$SAMSUNG.MicrositeVideoControls.toggleFullScreen(isFullScreen);
                        } else {
                            //If click on video playerbox, play or pause it
                            window.$SAMSUNG.MicrositeVideoHandler.handleVideo();
                        }
                        break;
                    case window.$SAMSUNG.NavSections.Videos:   // video thumbnails
                        var id = focusedElem.getAttribute('id');
                        window.$SAMSUNG.logEvent('##### handleEnterEvent - Going to play video: ' + id);
                        window.$SAMSUNG.MicrositeVideoHandler.handleVideo(id);
                        videoControl && window.$SAMSUNG.MicrositeVideoControls.toggleFullScreen(false);
                        break;
                    case window.$SAMSUNG.NavSections.Exit:
                        //if click on exit button, close microsite
                        window.$SAMSUNG.closeMicrosite(exitRoute.pageExitButton);
                        break;
                    case window.$SAMSUNG.NavSections.PlayerButtons:
                        if (isVideoControlVisible()) {
                            window.$SAMSUNG.MicrositeVideoControls.handleController(false);
                        }

                        if (buttonWatchNow && !window.$SAMSUNG.MicrositeVideoControls.isFullScreen()) {
                            window.$SAMSUNG.MicrositeNav.setFocusToWatchNow();
                        }
                        break;
                    case window.$SAMSUNG.NavSections.Apps:
                        //if user clicks on app thumbnail
                        var appThId   = focusedElem.getAttribute('id');
                        var appDetail = getAppDetails(appThId);
                        var videoTag  = document.getElementById('videoPlayerBox');
                        window.$SAMSUNG.logEvent('handleEnterEvent, app: ' + JSON.stringify(appDetail));

                        videoTag.pause();
                        videoTag.firstElementChild.src = '';
                        videoTag.load();
                        window.$SAMSUNG.MicrositeTracking.appClickTracking(appThId);
                        window.$SAMSUNG.MicrositeTracking.timeSpentTracking();
                        window.$SAMSUNG.MicrositeTracking.pageTracking(window.$SAMSUNG.CONSTANTS.PageTrackingKeys.micrositeExit, exitRoute.appLaunching + appThId);
                        window.$SAMSUNG.openApp(appDetail.appid, appDetail.type, appDetail.deeplink, '');
                }
            }

            function flashWatchButton() {
                buttonWatchNow.classList.add('flash');

                var myTimeout = setTimeout(function () {
                    buttonWatchNow.classList.remove('flash');
                    clearTimeout(myTimeout);
                }, 250);
            }

            function isVideoControlVisible() {
                return (videoControl && videoControl.style.visibility === 'visible');
            }
        })();
    } catch (e) {
        // TODO: The following logEvent crashes the Design Mode and template can't be loaded!
        !isDesignMode && window.$SAMSUNG.logEvent('!!!! Microsite caught errors: ' + e.msg);
    }
</script>

</html>
